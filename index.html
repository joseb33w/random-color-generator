<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Random Color Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <div class="color-display">
      <div class="hex-code" id="hex">TAP ANYWHERE</div>
      <div class="rgb-code" id="rgb">to generate a color</div>
    </div>
    <div class="hint" id="hint">👆 Tap the screen</div>
    <div class="history" id="history"></div>
    <button class="copy-btn" id="copyBtn" title="Copy hex code">📋</button>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
